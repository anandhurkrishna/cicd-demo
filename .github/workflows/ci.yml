name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cicd-demo:$IMAGE_TAG .
          docker tag ${{ secrets.DOCKER_USERNAME }}/cicd-demo:$IMAGE_TAG ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cicd-demo:$IMAGE_TAG
          docker push ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Dummy Deploy Step
        run: echo "Deploy stage ready (we will activate later)"
