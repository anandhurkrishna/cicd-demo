name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cicd-demo:$IMAGE_TAG .
          docker tag ${{ secrets.DOCKER_USERNAME }}/cicd-demo:$IMAGE_TAG ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cicd-demo:$IMAGE_TAG
          docker push ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest
