version: "3.8"

services:
  app1:
    image: anandhurkrishna/cicd-demo:latest
    container_name: cicd-app-1
    restart: always
    mem_limit: 512m
    cpus: 0.5

  app2:
    image: anandhurkrishna/cicd-demo:latest
    container_name: cicd-app-2
    restart: always
    mem_limit: 512m
    cpus: 0.5

  nginx:
    image: nginx:latest
    container_name: cicd-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app1
      - app2
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: cicd-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - app1
      - app2
      - node-exporter
    restart: always

  node-exporter:
    image: prom/node-exporter:latest
    container_name: cicd-node-exporter
    ports:
      - "9100:9100"
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: cicd-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: always

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cicd-cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: always
