version: '3.8'

services:
  app:
    image: anandhurkrishna/cicd-demo:latest
    container_name: cicd-app
    restart: always

  nginx:
    image: nginx:latest
    container_name: cicd-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    restart: always
