global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "flask-apps"
    static_configs:
      - targets:
          - "app1:80"
          - "app2:80"

  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "node-exporter:9100"

  - job_name: "cadvisor"
    static_configs:
      - targets:
          - "cadvisor:8080"
